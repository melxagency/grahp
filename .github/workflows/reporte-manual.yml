name: Reporte Manual Facebook Groups

on:
  workflow_dispatch:   # 👈 SOLO MANUAL

jobs:
  generar-reporte:
    runs-on: ubuntu-latest

    steps:
      - name: Ejecutar Edge Function en Supabase
        run: |
          curl -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/telegram-manual-report" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
          -d '{
            "source": "github_actions"
          }'

name: Miembros Inicio de la semana

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Lunes 1:00 AM hora de Cuba (UTC-5)

jobs:
  count-members:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. CHECKOUT
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # 2. INSTALL TOOLS
      # =========================
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # =========================
      # 3. FETCH GROUPS
      # =========================
      - name: Fetch Group IDs from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "📡 Fetching group IDs..."

          # Validar secret
          if [ -z "$SUPABASE_KEY" ]; then
            echo "❌ ERROR: SUPABASE_KEY vacío"
            exit 1
          fi

          RESPONSE=$(curl -s \
            "${SUPABASE_URL}/rest/v1/facebook_groups?select=id_group&limit=1000" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json")

          echo "$RESPONSE" > groups.json

          echo "📄 RAW RESPONSE:"
          cat groups.json

          # Validar JSON correcto
          if ! echo "$RESPONSE" | jq -e 'type == "array"' > /dev/null; then
            echo "❌ ERROR: Supabase no devolvió un array válido"
            exit 1
          fi

          if [ ! -s groups.json ]; then
            echo "❌ ERROR: groups.json vacío"
            exit 1
          fi

      # =========================
      # 4. FETCH FACEBOOK DATA
      # =========================
      - name: Fetch Facebook data
        env:
          FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_TOKEN }}
        run: |
          echo "🔎 Processing Facebook groups..."

          RESULT="[]"

          for row in $(jq -c '.[]' groups.json); do

            GROUP_ID=$(echo "$row" | jq -r '.id_group')

            echo "➡️ Grupo: $GROUP_ID"

            RESPONSE=$(curl -s \
              "https://graph.facebook.com/v25.0/${GROUP_ID}?fields=member_count&access_token=${FACEBOOK_TOKEN}")

            echo "📥 FB RESPONSE: $RESPONSE"

            COUNT=$(echo "$RESPONSE" | jq -r '.member_count // empty')

            # Validaciones
            if [ -z "$COUNT" ] || [ "$COUNT" = "null" ]; then
              echo "⚠️ Sin datos para $GROUP_ID"
              continue
            fi

            if ! [[ "$COUNT" =~ ^[0-9]+$ ]]; then
              echo "⚠️ COUNT inválido: $COUNT"
              continue
            fi

            RESULT=$(echo "$RESULT" | jq \
              --arg id "$GROUP_ID" \
              --argjson count "$COUNT" \
              '. + [{"id_group": $id, "miembros_inicio_semana": $count}]')
          done

          echo "$RESULT" > update_payload.json

          echo "📦 PAYLOAD GENERADO:"
          cat update_payload.json

      # =========================
      # 5. UPDATE SUPABASE
      # =========================
      - name: Update Supabase (inicio de semana)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "🚀 Updating inicio de semana..."

          if [ -z "$SUPABASE_KEY" ]; then
            echo "❌ ERROR: SUPABASE_KEY vacío"
            exit 1
          fi

          if [ ! -s update_payload.json ]; then
            echo "❌ ERROR: payload vacío"
            exit 1
          fi

          for row in $(jq -c '.[]' update_payload.json); do

            GROUP_ID=$(echo "$row" | jq -r '.id_group')
            COUNT=$(echo "$row" | jq -r '.miembros_inicio_semana')

            echo "📦 Updating $GROUP_ID → $COUNT"

            RESPONSE=$(curl -s -w "\nHTTP: %{http_code}\n" -X PATCH \
              "${SUPABASE_URL}/rest/v1/facebook_groups?id_group=eq.${GROUP_ID}" \
              -H "apikey: ${SUPABASE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=representation" \
              -d "{\"miembros_inicio_semana\": ${COUNT}}")

            echo "$RESPONSE"
          done

          echo "🎉 DONE"

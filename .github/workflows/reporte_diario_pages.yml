name: Reporte Diario Completo

on:
  workflow_dispatch:
  schedule:
   - cron: "0 23 * * *" # 8 PM Cuba (UTC-5)

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install axios @supabase/supabase-js

      # =========================
      # 1. Ejecutar script principal
      # =========================
      - name: Run report script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node reporte_diario.js

      # =========================
      # 2. Generar PDF (Edge Function)
      # =========================
      - name: Generate PDF Report
        run: |
          curl -X POST "https://cqwdrsxcylkvlscvggwt.supabase.co/functions/v1/reporte_publicitario" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -d '{
            "fileName": "reporte_diario.pdf"
          }'

- name: Miembros Inicio del Dia
        env:
          FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "🔎 Starting Facebook Groups member count..."
          TOTAL=0
          UPDATED=0
          ERRORS=0
          echo "-----------------------------"

          while IFS= read -r GROUP_ID; do
            [ -z "$GROUP_ID" ] && continue

            echo "📦 Group: $GROUP_ID"
            RESPONSE=$(curl -s "https://graph.facebook.com/v25.0/${GROUP_ID}?fields=member_count&access_token=${FACEBOOK_TOKEN}")
            echo "$RESPONSE"

            ERROR=$(echo "$RESPONSE" | jq '.error // empty')
            if [ -n "$ERROR" ]; then
              echo "⚠️ Error fetching group $GROUP_ID: $ERROR"
              ERRORS=$((ERRORS + 1))
              echo "-----------------------------"
              # Esperar 30 segundos si hay rate limit antes de continuar
              sleep 30
              continue
            fi

            COUNT=$(echo "$RESPONSE" | jq '.member_count // 0')

            if [ "$COUNT" -gt 0 ]; then
              echo "👥 Members: $COUNT"

              UPDATE_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
                -X PATCH \
                "${SUPABASE_URL}/rest/v1/facebook_groups?id_group=eq.${GROUP_ID}" \
                -H "apikey: ${SUPABASE_KEY}" \
                -H "Authorization: Bearer ${SUPABASE_KEY}" \
                -H "Content-Type: application/json" \
                -H "Prefer: return=minimal" \
                -d "{\"miembros_actuales\": ${COUNT}, \"miembros_inicio_dia\": ${COUNT}}")

              if [ "$UPDATE_RESPONSE" = "204" ]; then
                echo "✅ Updated in Supabase"
                UPDATED=$((UPDATED + 1))
              else
                echo "❌ Failed to update Supabase (HTTP $UPDATE_RESPONSE)"
                ERRORS=$((ERRORS + 1))
              fi

              TOTAL=$((TOTAL + COUNT))
            else
              echo "⚠️ Skipping update for group $GROUP_ID (count = 0)"
            fi

            echo "-----------------------------"
            # Esperar 2 segundos entre cada grupo para no saturar la API
            sleep 2

          done < group_ids.txt

          echo "============================="
          echo "📊 TOTAL MEMBERS: $TOTAL"
          echo "✅ UPDATED: $UPDATED groups"
          echo "❌ ERRORS: $ERRORS groups"
          echo "============================="

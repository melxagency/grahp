name: Facebook Group Members Counter

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  count-members:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch Facebook Group Members
        env:
          FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_TOKEN }}
        run: |
          echo "🔎 Starting Facebook Groups member count..."

          TOTAL=0

          echo "-----------------------------"
          echo "📦 Group: 8481964255255929"
          R1=$(curl -s "https://graph.facebook.com/v25.0/8481964255255929?fields=member_count&access_token=${FACEBOOK_TOKEN}")
          echo "$R1"
          C1=$(echo "$R1" | jq '.member_count // 0')
          echo "👥 Members: $C1"
          TOTAL=$((TOTAL + C1))

          echo "-----------------------------"
          echo "📦 Group: 8856301654435091"
          R2=$(curl -s "https://graph.facebook.com/v25.0/8856301654435091?fields=member_count&access_token=${FACEBOOK_TOKEN}")
          echo "$R2"
          C2=$(echo "$R2" | jq '.member_count // 0')
          echo "👥 Members: $C2"
          TOTAL=$((TOTAL + C2))

          echo "-----------------------------"
          echo "📦 Group: 6166833830005702"
          R3=$(curl -s "https://graph.facebook.com/v25.0/6166833830005702?fields=member_count&access_token=${FACEBOOK_TOKEN}")
          echo "$R3"
          C3=$(echo "$R3" | jq '.member_count // 0')
          echo "👥 Members: $C3"
          TOTAL=$((TOTAL + C3))

          echo "-----------------------------"
          echo "📦 Group: 5111591572270244"
          R4=$(curl -s "https://graph.facebook.com/v25.0/5111591572270244?fields=member_count&access_token=${FACEBOOK_TOKEN}")
          echo "$R4"
          C4=$(echo "$R4" | jq '.member_count // 0')
          echo "👥 Members: $C4"
          TOTAL=$((TOTAL + C4))

          echo "-----------------------------"
          echo "📦 Group: 2938946762934546"
          R5=$(curl -s "https://graph.facebook.com/v25.0/2938946762934546?fields=member_count&access_token=${FACEBOOK_TOKEN}")
          echo "$R5"
          C5=$(echo "$R5" | jq '.member_count // 0')
          echo "👥 Members: $C5"
          TOTAL=$((TOTAL + C5))

          echo "-----------------------------"
          echo "📦 Group: 1793848928019756"
          R6=$(curl -s "https://graph.facebook.com/v25.0/1793848928019756?fields=member_count&access_token=${FACEBOOK_TOKEN}")
          echo "$R6"
          C6=$(echo "$R6" | jq '.member_count // 0')
          echo "👥 Members: $C6"
          TOTAL=$((TOTAL + C6))

          echo "============================="
          echo "📊 TOTAL MEMBERS: $TOTAL"
          echo "============================="

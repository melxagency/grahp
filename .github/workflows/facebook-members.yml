          echo "🔑 ID: $ID1"
          if [ -n "$ID1" ]; then
            R1=$(curl -s "https://graph.facebook.com/v25.0/${ID1}?fields=member_count&access_token=${FACEBOOK_TOKEN}")
            echo "$R1"
            C1=$(echo "$R1" | jq '.member_count // 0')
          else
            echo "❌ Could not resolve ID"
            C1=0
          fi
          echo "👥 Members: $C1"

name: Facebook Group Members Counter

on:
  schedule:
    - cron: "0 */6 * * *"  # cada 6 horas
  workflow_dispatch:

jobs:
  count-members:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch Facebook Group Members
        env:
          FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_TOKEN }}
        run: |
          echo "🔎 Starting Facebook Groups member count..."

          # 👉 Lista de grupos (IDs numéricos recomendados)
          GROUPS=(
            "8481964255255929"
            "8856301654435091"
            "6166833830005702"
            "5111591572270244"
            "2938946762934546"
            "1793848928019756"
          )

          TOTAL=0

          for GROUP_ID in "${GROUPS[@]}"
          do
            echo "-----------------------------"
            echo "📦 Checking group: $GROUP_ID"

            RESPONSE=$(curl -s "https://graph.facebook.com/v25.0/8481964255255929?fields=member_count&access_token=${FACEBOOK_TOKEN}")

            echo "Raw response: $RESPONSE"

            ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')

            if [ ! -z "$ERROR" ]; then
              echo "❌ Error: $ERROR"
              continue
            fi

            COUNT=$(echo "$RESPONSE" | jq '.member_count')

            # fallback si viene null
            COUNT=${COUNT:-0}

            echo "👥 Members: $COUNT"

            TOTAL=$((TOTAL + COUNT))
          done

          echo "============================="
          echo "📊 TOTAL MEMBERS ACROSS GROUPS: $TOTAL"
          echo "============================="

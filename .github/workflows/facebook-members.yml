name: Facebook Group Members Counter
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
jobs:
  count-members:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

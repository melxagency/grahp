name: Miembros inicio del dia
on:
  schedule:
    - cron: "5 5 * * *" 
  workflow_dispatch:

jobs:
  count-members:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # =========================
      # 1. FETCH GROUPS
      # =========================
      - name: Fetch Group IDs from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          curl -s \
            "${SUPABASE_URL}/rest/v1/facebook_groups?select=id_group&limit=1000" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            > groups.json

      # =========================
      # 2. FACEBOOK DATA
      # =========================
      - name: Fetch Facebook data
        env:
          FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_TOKEN }}
        run: |
          echo "🔎 Processing Facebook groups..."

          RESULT="[]"

          for row in $(jq -c '.[]' groups.json); do
            GROUP_ID=$(echo "$row" | jq -r '.id_group')

            RESPONSE=$(curl -s \
              "https://graph.facebook.com/v25.0/${GROUP_ID}?fields=member_count&access_token=${FACEBOOK_TOKEN}")

            COUNT=$(echo "$RESPONSE" | jq -r '.member_count // 0')

            if [ "$COUNT" -gt 0 ]; then
              RESULT=$(echo "$RESULT" | jq \
                --arg id "$GROUP_ID" \
                --argjson count "$COUNT" \
                '. + [{"id_group": ($id | tonumber), "miembros_actuales": $count}]')
            fi
          done

          echo "$RESULT" > update_payload.json

      # =========================
      # 3. CLEAN JSON
      # =========================
      - name: Clean JSON payload
        run: |
          jq -c '.' update_payload.json > payload_clean.json

      # =========================
      # 4. UPDATE SUPABASE
      # =========================
      - name: Update Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          curl -s -X POST \
            "${SUPABASE_URL}/functions/v1/bulk-update-members" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -d @payload_clean.json

      # =========================
      # 5. SEND TELEGRAM REPORT + PDF NAME
      # =========================
      - name: Send Telegram Report
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |

          # 📌 generar nombre del PDF
          DATE=$(date +"%d-%m-%Y")
          PDF_NAME="(+)reporte-crecimientoFG.pdf"

          echo "📄 PDF NAME: $PDF_NAME"

          curl -s -X POST \
            "${SUPABASE_URL}/functions/v1/telegram-notify" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"pdf_name\":\"${PDF_NAME}\"}"

          echo "📩 Report sent"

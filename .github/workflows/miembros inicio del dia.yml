name: Miembros Inicio del dia

on:
  workflow_dispatch:
  schedule:
    - cron: '5 5 * * *' # 00:05 AM hora de Cuba

jobs:
  count-members:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. CHECKOUT
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # 2. INSTALL TOOLS
      # =========================
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # =========================
      # 3. FETCH GROUPS
      # =========================
      - name: Fetch Group IDs from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "📡 Fetching group IDs..."

          curl -s \
            "${SUPABASE_URL}/rest/v1/facebook_groups?select=id_group&limit=1000" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            > groups.json

      # =========================
      # 4. FETCH FACEBOOK DATA
      # =========================
      - name: Fetch Facebook data
        env:
          FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_TOKEN }}
        run: |
          echo "🔎 Processing Facebook groups..."

          RESULT="[]"

          for row in $(jq -c '.[]' groups.json); do
            GROUP_ID=$(echo "$row" | jq -r '.id_group')

            RESPONSE=$(curl -s \
              "https://graph.facebook.com/v25.0/${GROUP_ID}?fields=member_count&access_token=${FACEBOOK_TOKEN}")

            COUNT=$(echo "$RESPONSE" | jq -r '.member_count // empty')

            # VALIDACIONES
            if [ -z "$COUNT" ] || [ "$COUNT" = "null" ]; then
              continue
            fi

            if [ "$COUNT" -eq 0 ]; then
              continue
            fi

            RESULT=$(echo "$RESULT" | jq \
              --arg id "$GROUP_ID" \
              --argjson count "$COUNT" \
              '. + [{"id_group": $id, "miembros_inicio_dia": $count}]')
          done

          echo "$RESULT" > update_payload.json

      # =========================
      # 5. UPDATE SUPABASE
      # =========================
      - name: Update Supabase (inicio del día)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "🚀 Updating inicio del día..."

          for row in $(jq -c '.[]' update_payload.json); do

            GROUP_ID=$(echo "$row" | jq -r '.id_group')
            COUNT=$(echo "$row" | jq -r '.miembros_inicio_dia')

            echo "📦 Updating $GROUP_ID → $COUNT"

            curl -s -X PATCH \
              "${SUPABASE_URL}/rest/v1/facebook_groups?id_group=eq.${GROUP_ID}" \
              -H "apikey: ${SUPABASE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d "{\"miembros_inicio_dia\": ${COUNT}}"

          done

          echo "🎉 DONE"

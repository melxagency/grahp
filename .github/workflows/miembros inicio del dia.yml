name: Miembros Inicio del dia

on:
  workflow_dispatch:

jobs:
  count-members:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. CHECKOUT
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # 2. INSTALL TOOLS
      # =========================
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # =========================
      # 3. FETCH GROUPS FROM SUPABASE
      # =========================
      - name: Fetch Group IDs from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "📡 Fetching group IDs..."

          curl -s \
            "${SUPABASE_URL}/rest/v1/facebook_groups?select=id_group&limit=1000" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            > groups.json

          echo "📦 RAW GROUPS:"
          cat groups.json

      # =========================
      # 4. FETCH FACEBOOK DATA
      # =========================
      - name: Fetch Facebook data
        env:
          FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_TOKEN }}
        run: |
          echo "🔎 Processing Facebook groups..."

          RESULT="[]"

          for row in $(jq -c '.[]' groups.json); do
            GROUP_ID=$(echo "$row" | jq -r '.id_group')

            echo "📦 Group: $GROUP_ID"

            RESPONSE=$(curl -s \
              "https://graph.facebook.com/v25.0/${GROUP_ID}?fields=member_count&access_token=${FACEBOOK_TOKEN}")

            COUNT=$(echo "$RESPONSE" | jq -r '.member_count // empty')

            echo "👥 COUNT: $COUNT"

            # validar
            if [ -z "$COUNT" ] || [ "$COUNT" = "null" ]; then
              echo "⚠️ Skip $GROUP_ID (invalid)"
              continue
            fi

            if [ "$COUNT" -eq 0 ]; then
              echo "⚠️ Skip $GROUP_ID (0 detected)"
              continue
            fi

            RESULT=$(echo "$RESULT" | jq \
              --arg id "$GROUP_ID" \
              --argjson count "$COUNT" \
              '. + [{"id_group": $id, "miembros_inicio_dia": $count}]')
          done

          echo "$RESULT" > update_payload.json
          echo "📦 FINAL PAYLOAD:"
          cat update_payload.json

      # =========================
      # 5. UPDATE SUPABASE (FIXED)
      # =========================
      - name: Update Supabase one by one
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "🚀 Updating groups..."

          for row in $(jq -c '.[]' update_payload.json); do

            GROUP_ID=$(echo "$row" | jq -r '.id_group')
            COUNT=$(echo "$row" | jq -r '.miembros_inicio_dia')

            echo "📦 Checking group $GROUP_ID"

            # =========================
            # CHECK EXISTENCE
            # =========================
            CHECK=$(curl -s \
              "${SUPABASE_URL}/rest/v1/facebook_groups?select=id_group&id_group=eq.${GROUP_ID}" \
              -H "apikey: ${SUPABASE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}")

            echo "CHECK RESULT: $CHECK"

            # =========================
            # UPDATE
            # =========================
            RESPONSE=$(curl -s -X PATCH \
              "${SUPABASE_URL}/rest/v1/facebook_groups?id_group=eq.${GROUP_ID}" \
              -H "apikey: ${SUPABASE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=representation" \
              -d "{\"miembros_actuales\": ${COUNT}}")

            echo "🟢 UPDATE RESPONSE: $RESPONSE"
          done

          echo "🎉 DONE"

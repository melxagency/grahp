name: Actualizar_Miembros

on:
  workflow_dispatch:

jobs:
  count-members:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # =========================
      # 1. FETCH GROUP IDS
      # =========================
      - name: Fetch Group IDs from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "📡 Fetching group IDs..."
          RESPONSE=$(curl -s \
            "${SUPABASE_URL}/rest/v1/facebook_groups?select=id_group,miembros_actuales&limit=1000" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")

          echo "$RESPONSE" > groups.json

      # =========================
      # 2. PROCESS FACEBOOK DATA (NO UPDATE YET)
      # =========================
      - name: Fetch Facebook data
        env:
          FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_TOKEN }}
        run: |
          echo "🔎 Processing Facebook groups..."

          RESULT="[]"

          for row in $(jq -c '.[]' groups.json); do
            GROUP_ID=$(echo $row | jq -r '.id_group')

            echo "📦 Group: $GROUP_ID"

            RESPONSE=$(curl -s "https://graph.facebook.com/v25.0/${GROUP_ID}?fields=member_count&access_token=${FACEBOOK_TOKEN}")

            COUNT=$(echo "$RESPONSE" | jq '.member_count // 0')

            echo "👥 $COUNT"

            RESULT=$(echo $RESULT | jq --arg id "$GROUP_ID" --argjson count "$COUNT" \
              '. + [{"id_group": $id, "miembros_actuales": $count}]')
          done

          echo "$RESULT" > update_payload.json

      # =========================
      # 3. SINGLE BULK UPDATE (IMPORTANT CHANGE)
      # =========================
      - name: Update Supabase (ONE REQUEST ONLY)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "🚀 Sending bulk update..."

          PAYLOAD=$(cat update_payload.json)

          # usamos RPC o endpoint batch (RECOMENDADO)
          curl -s -X POST \
            "${SUPABASE_URL}/rest/v1/rpc/bulk_update_members" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          echo "✅ Bulk update completed"

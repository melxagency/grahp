name: Actualizar_Miembros

on:
  workflow_dispatch:

jobs:
  count-members:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. CHECKOUT
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # 2. INSTALL TOOLS
      # =========================
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # =========================
      # 3. FETCH GROUPS FROM SUPABASE
      # =========================
      - name: Fetch Group IDs from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "📡 Fetching group IDs..."

          curl -s \
            "${SUPABASE_URL}/rest/v1/facebook_groups?select=id_group&limit=1000" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            > groups.json

      # =========================
      # 4. FETCH FACEBOOK DATA (SAFE)
      # =========================
      - name: Fetch Facebook data
        env:
          FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_TOKEN }}
        run: |
          echo "🔎 Processing Facebook groups..."

          RESULT="[]"

          for row in $(jq -c '.[]' groups.json); do
            GROUP_ID=$(echo "$row" | jq -r '.id_group')

            echo "📦 Group: $GROUP_ID"

            RESPONSE=$(curl -s \
              "https://graph.facebook.com/v25.0/${GROUP_ID}?fields=member_count&access_token=${FACEBOOK_TOKEN}")

            COUNT=$(echo "$RESPONSE" | jq -r '.member_count')

            # =========================
            # VALIDACIONES CRÍTICAS
            # =========================
            if [[ -z "$COUNT" || "$COUNT" == "null" ]]; then
              echo "⚠️ NULL response → skip $GROUP_ID"
              continue
            fi

            if [[ "$COUNT" -eq 0 ]]; then
              echo "⚠️ COUNT = 0 detected (API limit/error) → skip $GROUP_ID"
              continue
            fi

            echo "👥 VALID COUNT: $COUNT"

            RESULT=$(echo "$RESULT" | jq \
              --arg id "$GROUP_ID" \
              --argjson count "$COUNT" \
              '. + [{"id_group": $id, "miembros_actuales": $count}]')
          done

          echo "$RESULT" > update_payload.json

      # =========================
      # 5. UPDATE SUPABASE ONE BY ONE
      # =========================
      - name: Update Supabase one by one
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "🚀 Updating groups one by one..."

          for row in $(jq -c '.[]' update_payload.json); do
            GROUP_ID=$(echo "$row" | jq -r '.id_group')
            COUNT=$(echo "$row" | jq -r '.miembros_actuales')

            echo "📦 Updating $GROUP_ID → $COUNT"

            RESPONSE=$(curl -s -o response.txt -w "%{http_code}" -X PATCH \
              "${SUPABASE_URL}/rest/v1/facebook_groups?id_group=eq.${GROUP_ID}" \
              -H "apikey: ${SUPABASE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d "{\"miembros_actuales\": $COUNT}")

            echo "HTTP: $RESPONSE"
            cat response.txt

            echo "✅ Updated $GROUP_ID"
          done

          echo "🎉 All groups updated"

      # =========================
      # 6. SEND TELEGRAM REPORT
      # =========================
      - name: Send Telegram report
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "📨 Sending report..."

          FILE_NAME="reporte_miembros $(date +'%Y-%m-%d').pdf"

          curl -s -X POST \
            "https://cqwdrsxcylkvlscvggwt.supabase.co/functions/v1/telegram-notify" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"fileName\":\"$FILE_NAME\"}"

          echo "✅ Report sent"

name: Miembros Diario + Reporte

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *' # 8:00 PM Cuba (UTC-5)

jobs:
  count-members:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. CHECKOUT
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # 2. INSTALL TOOLS
      # =========================
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # =========================
      # 3. FETCH GROUPS
      # =========================
      - name: Fetch Group IDs from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "📡 Fetching group IDs..."

          if [ -z "$SUPABASE_KEY" ]; then
            echo "❌ ERROR: SUPABASE_KEY vacío"
            exit 1
          fi

          RESPONSE=$(curl -s \
            "${SUPABASE_URL}/rest/v1/facebook_groups?select=id_group&limit=1000" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json")

          echo "$RESPONSE" > groups.json

          echo "📄 RAW RESPONSE:"
          cat groups.json

          if ! echo "$RESPONSE" | jq -e 'type == "array"' > /dev/null; then
            echo "❌ ERROR: Supabase no devolvió un array válido"
            exit 1
          fi

      # =========================
      # 4. FETCH FACEBOOK DATA
      # =========================
      - name: Fetch Facebook data
        env:
          FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_TOKEN }}
        run: |
          echo "🔎 Processing Facebook groups..."

          RESULT="[]"

          for row in $(jq -c '.[]' groups.json); do

            GROUP_ID=$(echo "$row" | jq -r '.id_group')

            RESPONSE=$(curl -s \
              "https://graph.facebook.com/v25.0/${GROUP_ID}?fields=member_count&access_token=${FACEBOOK_TOKEN}")

            COUNT=$(echo "$RESPONSE" | jq -r '.member_count // empty')

            if [ -z "$COUNT" ] || [ "$COUNT" = "null" ]; then
              continue
            fi

            if ! [[ "$COUNT" =~ ^[0-9]+$ ]]; then
              continue
            fi

            RESULT=$(echo "$RESULT" | jq \
              --arg id "$GROUP_ID" \
              --argjson count "$COUNT" \
              '. + [{"id_group": $id, "miembros_inicio_dia": $count}]')
          done

          echo "$RESULT" > update_payload.json

          echo "📦 PAYLOAD GENERADO:"
          cat update_payload.json

      # =========================
      # 5. UPDATE SUPABASE
      # =========================
      - name: Update Supabase (inicio del día)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "🚀 Updating inicio del día..."

          if [ ! -s update_payload.json ]; then
            echo "❌ ERROR: payload vacío"
            exit 1
          fi

          for row in $(jq -c '.[]' update_payload.json); do

            GROUP_ID=$(echo "$row" | jq -r '.id_group')
            COUNT=$(echo "$row" | jq -r '.miembros_inicio_dia')

            curl -s -X PATCH \
              "${SUPABASE_URL}/rest/v1/facebook_groups?id_group=eq.${GROUP_ID}" \
              -H "apikey: ${SUPABASE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"miembros_inicio_dia\": ${COUNT}}"
          done

          echo "✅ Supabase actualizado"

      # =========================
      # 6. TELEGRAM REPORT
      # =========================
      - name: Send Telegram report
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "📨 Sending report..."

          FILE_NAME="reporte_miembros $(date +'%Y-%m-%d').pdf"

          curl -s -X POST \
            "https://cqwdrsxcylkvlscvggwt.supabase.co/functions/v1/telegram-notify" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"fileName\":\"$FILE_NAME\"}"

          echo "✅ Report sent"

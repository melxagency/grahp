name: Actualizar_Miembros

on:
  workflow_dispatch:

jobs:
  count-members:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. CHECKOUT
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # 2. INSTALL TOOLS
      # =========================
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # =========================
      # 3. FETCH GROUPS FROM SUPABASE
      # =========================
      - name: Fetch Group IDs from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "📡 Fetching group IDs..."

          curl -s \
            "${SUPABASE_URL}/rest/v1/facebook_groups?select=id_group&limit=1000" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            > groups.json

      # =========================
      # 4. FETCH FACEBOOK DATA
      # =========================
      - name: Fetch Facebook data
        env:
          FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_TOKEN }}
        run: |
          echo "🔎 Processing Facebook groups..."

          RESULT="[]"

          for row in $(jq -c '.[]' groups.json); do
            GROUP_ID=$(echo "$row" | jq -r '.id_group')

            echo "📦 Group: $GROUP_ID"

            RESPONSE=$(curl -s \
              "https://graph.facebook.com/v25.0/${GROUP_ID}?fields=member_count&access_token=${FACEBOOK_TOKEN}")

            COUNT=$(echo "$RESPONSE" | jq -r '.member_count // 0')

            echo "👥 $COUNT"

            RESULT=$(echo "$RESULT" | jq --arg id "$GROUP_ID" --argjson count "$COUNT" \
              '. + [{"id_group": ($id | tonumber), "miembros_actuales": $count}]')
          done

          echo "$RESULT" > update_payload.json

      # =========================
      # 5. CLEAN JSON
      # =========================
      - name: Clean JSON payload
        run: |
          jq -c '.' update_payload.json > payload_clean.json

      # =========================
      # 6. SEND TO SUPABASE EDGE FUNCTION (NO RPC)
      # =========================
      - name: Send update to Edge Function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "🚀 Sending to Edge Function..."

          curl -s -X POST \
            "${SUPABASE_URL}/functions/v1/bulk-update-members" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -d @payload_clean.json

          echo "✅ Update completed"
